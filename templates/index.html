<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hobby Finder – Activity Qualification Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f7fb;
        color: #1b1f2a;
      }
      .container {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px;
      }
      .card {
        background: white;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      }
      h1, h2, h3 {
        margin-top: 0;
      }
      .muted {
        color: #5a6478;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      input[type="text"] {
        flex: 1;
        min-width: 240px;
        padding: 10px;
        border: 1px solid #ccd5e5;
        border-radius: 8px;
      }
      button {
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        background: #2f62ff;
        color: white;
        cursor: pointer;
      }
      .sample-btn {
        background: #eef3ff;
        color: #2042a5;
      }
      .result {
        margin-top: 16px;
        background: #f8faff;
        border: 1px solid #dde3f0;
        border-radius: 8px;
        padding: 12px;
      }
      .result-grid {
        display: grid;
        gap: 8px;
      }
      .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: #e7edff;
        color: #1e3f9a;
        font-size: 0.9rem;
      }
      ul {
        margin: 6px 0 0;
        padding-left: 20px;
      }
      .list-empty {
        margin-top: 6px;
      }
      pre {
        margin: 8px 0 0;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Hobby Finder – Activity Qualification Demo</h1>
        <p class="muted">Welche Tätigkeit möchtest du prüfen?</p>

        <div class="row" style="margin-bottom: 8px;">
          <input id="activity-input" type="text" placeholder="z. B. bouldern" />
          <button id="qualify-btn" type="button">Prüfen</button>
        </div>

        <div class="row" style="margin-bottom: 12px;">
          <button class="sample-btn" type="button" data-sample="bouldern">bouldern</button>
          <button class="sample-btn" type="button" data-sample="mountainbike">mountainbike</button>
          <button class="sample-btn" type="button" data-sample="gitarre">gitarre</button>
          <button class="sample-btn" type="button" data-sample="fotografie">fotografie</button>
          <button class="sample-btn" type="button" data-sample="briefmarkensammeln">briefmarkensammeln</button>
        </div>

        <div id="result" class="result" hidden>
          <h3>Ergebnis</h3>
          <div class="result-grid">
            <div><strong>Erkannte Aktivität:</strong> <span id="recognized-activity">-</span></div>
            <div>
              <strong>Status:</strong>
              <span id="qualification-status" class="status-badge">-</span>
            </div>
            <div><strong>Score:</strong> <span id="qualification-score">-</span></div>

            <div>
              <strong>Supporting attributes:</strong>
              <ul id="supporting-attributes" hidden></ul>
              <div id="supporting-empty" class="muted list-empty">Keine vorhanden</div>
            </div>

            <div>
              <strong>Missing or weak attributes:</strong>
              <ul id="missing-attributes" hidden></ul>
              <div id="missing-empty" class="muted list-empty">Keine vorhanden</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const inputEl = document.getElementById("activity-input");
      const qualifyBtn = document.getElementById("qualify-btn");
      const resultEl = document.getElementById("result");

      const recognizedEl = document.getElementById("recognized-activity");
      const statusEl = document.getElementById("qualification-status");
      const scoreEl = document.getElementById("qualification-score");
      const supportingListEl = document.getElementById("supporting-attributes");
      const supportingEmptyEl = document.getElementById("supporting-empty");
      const missingListEl = document.getElementById("missing-attributes");
      const missingEmptyEl = document.getElementById("missing-empty");

      function renderList(listEl, emptyEl, items) {
        listEl.innerHTML = "";
        if (!items.length) {
          listEl.hidden = true;
          emptyEl.hidden = false;
          return;
        }

        items.forEach((item) => {
          const entry = document.createElement("li");
          entry.textContent = item;
          listEl.appendChild(entry);
        });

        listEl.hidden = false;
        emptyEl.hidden = true;
      }

      function renderResult(payload) {
        const match = payload.match || {};
        const qualification = payload.qualification || {};

        recognizedEl.textContent = match.activity_name || "Nicht erkannt";

        statusEl.textContent = qualification.status || "-";
        scoreEl.textContent = Number.isFinite(qualification.score) ? qualification.score : "-";

        const supportingAttributes = qualification.supporting_attributes || [];
        const missingAttributes = qualification.missing_or_weak_attributes || [];

        renderList(supportingListEl, supportingEmptyEl, supportingAttributes);
        renderList(missingListEl, missingEmptyEl, missingAttributes);

        resultEl.hidden = false;
      }

      async function qualifyActivity() {
        const activity = inputEl.value.trim();
        if (!activity) {
          return;
        }

        const response = await fetch("/qualify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ activity }),
        });

        const payload = await response.json();

        if (!response.ok) {
          recognizedEl.textContent = "Fehler";
          statusEl.textContent = `HTTP ${response.status}`;
          scoreEl.textContent = "-";
          renderList(supportingListEl, supportingEmptyEl, []);
          renderList(missingListEl, missingEmptyEl, []);
          resultEl.hidden = false;
          return;
        }

        renderResult(payload);
      }

      qualifyBtn.addEventListener("click", qualifyActivity);
      inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          qualifyActivity();
        }
      });

      document.querySelectorAll("[data-sample]").forEach((button) => {
        button.addEventListener("click", () => {
          inputEl.value = button.dataset.sample;
          inputEl.focus();
        });
      });
    </script>
  </body>
</html>
